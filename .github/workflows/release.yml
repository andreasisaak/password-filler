name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('extension/manifest.json', 'utf8'));
            m.version = process.env.VERSION;
            fs.writeFileSync('extension/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Install host dependencies
        run: npm install
        working-directory: host

      - name: Build standalone host binary
        run: npx pkg htpasswd-host.js --targets node18-macos-arm64 --output ../dist/passwordfiller-host
        working-directory: host

      - name: Add JIT entitlements to binary (macOS 15+)
        run: |
          codesign --force --sign - \
            --entitlements installer/entitlements.plist \
            dist/passwordfiller-host

      - name: Pack Chrome CRX
        env:
          CHROME_PEM: ${{ secrets.CHROME_EXTENSION_PEM }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm install --no-save crx3
          node scripts/pack-crx.js "$VERSION"
          node scripts/build-cws-crx.js "$VERSION"

      - name: Cleanup PEM key
        if: always()
        run: rm -f extension.pem

      - name: Sign Firefox extension
        env:
          AMO_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          AMO_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm install -g web-ext
          web-ext sign \
            --source-dir extension \
            --channel unlisted \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir dist
          mv dist/*.xpi "dist/password-filler-firefox-v${VERSION}.xpi"

      - name: Update Chrome update manifest
        run: node scripts/update-chrome-xml.js ${{ steps.version.outputs.version }}

      - name: Update Firefox update manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('updates/firefox.json', 'utf8'));
            const addon = m.addons['passwordfiller@app'];
            addon.updates.unshift({
              version: process.env.VERSION,
              update_link: 'https://github.com/andreasisaak/password-filler/releases/download/v' + process.env.VERSION + '/password-filler-firefox-v' + process.env.VERSION + '.xpi'
            });
            addon.updates = addon.updates.slice(0, 10);
            fs.writeFileSync('updates/firefox.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add updates/chrome.xml updates/firefox.json extension/manifest.json
          git commit -m "chore: update manifests for v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Build .pkg installer (macOS)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p pkg-root/Library/Application\ Support/passwordfiller
          cp dist/passwordfiller-host "pkg-root/Library/Application Support/passwordfiller/passwordfiller-host"
          chmod +x "pkg-root/Library/Application Support/passwordfiller/passwordfiller-host"

          # Bundle entitlements.plist so postinstall can re-sign (belt-and-suspenders)
          cp installer/entitlements.plist "pkg-root/Library/Application Support/passwordfiller/entitlements.plist"

          # Bundle op CLI so it's available offline, no download at install time
          brew install 1password-cli
          cp "$(brew --prefix)/bin/op" "pkg-root/Library/Application Support/passwordfiller/op"
          chmod +x "pkg-root/Library/Application Support/passwordfiller/op"

          chmod +x installer/postinstall
          pkgbuild \
            --root pkg-root \
            --identifier app.passwordfiller \
            --version "$VERSION" \
            --scripts installer \
            dist/password-filler.pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/password-filler.pkg
            dist/password-filler-chrome-v${{ steps.version.outputs.version }}.crx
            dist/password-filler-chrome-v${{ steps.version.outputs.version }}.zip
            dist/password-filler-cws-v${{ steps.version.outputs.version }}.crx
            dist/password-filler-cws-v${{ steps.version.outputs.version }}.zip
            dist/password-filler-firefox-v${{ steps.version.outputs.version }}.xpi

  linux:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install host dependencies
        run: npm install
        working-directory: host

      - name: Build Linux binary
        run: npx pkg htpasswd-host.js --targets node18-linux-x64 --output ../dist/passwordfiller-host-linux
        working-directory: host

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DEB_ROOT="dist/deb-root"

          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/lib/passwordfiller"

          cp dist/passwordfiller-host-linux "$DEB_ROOT/usr/lib/passwordfiller/passwordfiller-host"
          chmod +x "$DEB_ROOT/usr/lib/passwordfiller/passwordfiller-host"

          cp installer/postinst-linux.sh "$DEB_ROOT/DEBIAN/postinst"
          chmod +x "$DEB_ROOT/DEBIAN/postinst"

          printf 'Package: password-filler\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: andreasisaak\nDescription: Auto-fills HTTP Basic Auth dialogs from 1Password\n Chrome/Firefox/Brave extension companion that reads credentials\n from 1Password and fills HTTP Basic Auth prompts automatically.\n' "$VERSION" > "$DEB_ROOT/DEBIAN/control"

          dpkg-deb --build "$DEB_ROOT" "dist/password-filler-linux-v${VERSION}.deb"

      - name: Build Linux tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist/password-filler-linux
          cp dist/passwordfiller-host-linux dist/password-filler-linux/passwordfiller-host-linux
          cp installer/install-linux.sh dist/password-filler-linux/install.sh
          chmod +x dist/password-filler-linux/install.sh dist/password-filler-linux/passwordfiller-host-linux
          tar -czf "dist/password-filler-linux-v${VERSION}.tar.gz" -C dist password-filler-linux

      - name: Upload Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/password-filler-linux-v${{ steps.version.outputs.version }}.deb
            dist/password-filler-linux-v${{ steps.version.outputs.version }}.tar.gz
